# Render deployment config (free tier).
# Usage:
#   1. Push this repo to GitHub.
#   2. In Render: New → Blueprint → connect the repo → use this file.
#   3. Render provisions the free PostgreSQL DB automatically and injects
#      DATABASE_URL. Set the remaining secret env vars in the dashboard.
#   4. Configure Cloudflare R2 (free) and set the R2_* env vars so
#      uploaded media persists (Render Free has no persistent disk).
#   5. After deploy, open the .onrender.com URL (HTTPS auto).
services:
  - type: web
    name: kilocode
    runtime: node
    plan: free
    region: oregon          # pick the region closest to you
    branch: main            # change if your default branch differs
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_TYPE
        value: postgres
      - key: PORT               # Render injects this automatically; listed for clarity
        sync: false
      - key: SESSION_SECRET
        generateValue: true     # Render generates a strong random secret
      - key: HTTPS
        value: "true"          # Render terminates TLS; app trusts X-Forwarded-*
      - key: CORS_ORIGIN
        value: "https://kilocode.onrender.com"   # CHANGE to your real URL
      - key: STORAGE_TYPE
        value: r2
      - key: R2_BUCKET
        sync: false          # set in dashboard
      - key: R2_ENDPOINT
        sync: false          # set in dashboard (e.g. https://<id>.r2.cloudflarestorage.com)
      - key: R2_REGION
        value: auto
      - key: R2_ACCESS_KEY_ID
        sync: false          # set in dashboard
      - key: R2_SECRET_ACCESS_KEY
        sync: false          # set in dashboard
      - key: R2_PUBLIC_URL
        sync: false          # set in dashboard (public bucket URL)
      - key: DATABASE_URL
        fromDatabase:
          name: kilocode-db
          property: connectionString
databases:
  - name: kilocode-db
    plan: free
    databaseName: kilocode
    user: kilocode
    postgresMajorVersion: "15"
    ipAllowList: []
