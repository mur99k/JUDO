# Render deployment config (free tier).
# Usage:
#   1. Create a free PostgreSQL database on Neon (neon.tech) — 500 MB,
#      serverless, no 90-day expiry. Copy the connection string
#      (project-pooler DATABASE_URL).
#   2. Create a free Cloudflare R2 bucket for media storage. Note the
#      endpoint, access key, secret, and public URL.
#   3. Push this repo to GitHub.
#   4. In Render: New → Blueprint → connect the repo → use this file.
#   5. Set the following env vars in the Render dashboard:
#        DATABASE_URL   (Neon connection string)
#        R2_BUCKET, R2_ENDPOINT, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY,
#        R2_PUBLIC_URL, CORS_ORIGIN (your .onrender.com URL)
#      SESSION_SECRET is auto-generated by Render.
#   6. After deploy, open the .onrender.com URL (HTTPS auto).
services:
  - type: web
    name: kilocode
    runtime: node
    plan: free
    region: oregon          # pick the region closest to you
    branch: main            # change if your default branch differs
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_TYPE
        value: postgres
      - key: PORT               # Render injects this automatically; listed for clarity
        sync: false
      - key: SESSION_SECRET
        generateValue: true     # Render generates a strong random secret
      - key: HTTPS
        value: "true"          # Render terminates TLS; app trusts X-Forwarded-*
      - key: CORS_ORIGIN
        sync: false          # set in dashboard to your .onrender.com URL
      - key: STORAGE_TYPE
        value: r2
      - key: R2_BUCKET
        sync: false          # set in dashboard
      - key: R2_ENDPOINT
        sync: false          # set in dashboard (e.g. https://<id>.r2.cloudflarestorage.com)
      - key: R2_REGION
        value: auto
      - key: R2_ACCESS_KEY_ID
        sync: false          # set in dashboard
      - key: R2_SECRET_ACCESS_KEY
        sync: false          # set in dashboard
      - key: R2_PUBLIC_URL
        sync: false          # set in dashboard (public bucket URL)
      - key: DATABASE_URL
        sync: false          # set in dashboard (Neon connection string)
