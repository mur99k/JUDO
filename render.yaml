# Render deployment config (free tier).
# Usage:
#   1. Push this repo to GitHub.
#   2. In Render: New → Blueprint → connect the repo → use this file.
#   3. Set the secret env vars below in the dashboard (or Render will prompt).
#   4. After deploy, open the .onrender.com URL (HTTPS auto).
services:
  - type: web
    name: kilocode
    runtime: node
    plan: free
    region: oregon          # pick the region closest to you
    branch: main            # change if your default branch differs
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    # Persistent disk — WITHOUT this, the SQLite DB and uploads are wiped
    # on every deploy/restart (free tier has an ephemeral filesystem).
    disk:
      name: kilocode-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT               # Render injects this automatically; listed for clarity
        sync: false
      - key: SESSION_SECRET
        generateValue: true     # Render generates a strong random secret
      - key: HTTPS
        value: "true"          # Render terminates TLS; app trusts X-Forwarded-*
      - key: CORS_ORIGIN
        value: "https://kilocode.onrender.com"   # CHANGE to your real URL
      - key: DB_PATH
        value: /var/data/club.db
      - key: UPLOAD_PATH
        value: /var/data/uploads
      - key: GALLERY_DIR
        value: /var/data/gallery
      - key: COACH_DIR
        value: /var/data/coach-photos
      - key: LOG_LEVEL
        value: info
